services:
  backend:
    build:
      context: ./FlowLiteNodejs/backend
    restart: unless-stopped
    environment:
      PORT: 5001
      DATABASE_URL: /app/database/database.sqlite
      # Set this to your frontend's public URL so CORS is allowed
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - /opt/flowlite/database:/app/database
    expose:
      - "5001"

  frontend:
    build:
      context: ./FlowLiteNodejs/frontend
      args:
        # Must point to the public URL of the backend at build time
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5001/api}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
